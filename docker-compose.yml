# Local demo stack: Postgres (results DB) + Metabase (dashboard).
#   docker compose up -d
#   psql postgresql://cgp:cgp@localhost:5432/cgp -f db/schema.sql
#   psql postgresql://cgp:cgp@localhost:5432/cgp -f db/seed_demo.sql
#   open http://localhost:3000   (add the Postgres DB: host 'postgres', db 'cgp')

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cgp
      POSTGRES_PASSWORD: cgp
      POSTGRES_DB: cgp
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro   # schema.sql runs on first boot
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cgp']
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.6
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: cgp
      MB_DB_PORT: 5432
      MB_DB_USER: cgp
      MB_DB_PASS: cgp
      MB_DB_HOST: postgres

volumes:
  pgdata:
