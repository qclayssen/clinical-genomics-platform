# Full demo stack: Postgres + Metabase + Streamlit demo app.
#
# Start everything:
#   docker compose up -d
#
# Access:
#   Streamlit demo:  http://localhost:8501
#   Metabase:        http://localhost:3000
#   Postgres:        postgresql://cgp:cgp@localhost:5432/cgp
#
# On first boot, schema.sql and seed_demo.sql run automatically via
# docker-entrypoint-initdb.d (Postgres initialises the cgp database).
# In Metabase, add the Postgres DB: host 'postgres', port 5432, db 'cgp',
# user 'cgp', password 'cgp'.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cgp
      POSTGRES_PASSWORD: cgp
      POSTGRES_DB: cgp
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro   # schema.sql + seed_demo.sql on first boot
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cgp']
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.6
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Metabase stores its own state in a separate DB to avoid collisions with cgp schema
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: cgp
      MB_DB_PASS: cgp
      MB_DB_HOST: postgres
      JAVA_OPTS: '-Xmx512m -Xms256m'
    mem_limit: 768m
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: docker/Dockerfile.demo
    ports: ['8501:8501']
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8501/_stcore/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
