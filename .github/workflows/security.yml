name: security

on:
  push:
    paths:
      - '**/requirements*.txt'
      - '**/package-lock.json'
      - 'docker/**'
      - '.github/workflows/security.yml'
  pull_request:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Security tab

jobs:
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with: { python-version: '3.11' }

      - name: Install pip-audit
        run: pip install "pip-audit>=2.7,<3"

      - name: Audit ai-report dependencies (pinned)
        run: pip-audit -r ai-report/requirements-lock.txt -d --no-deps

      - name: Audit lambdas dependencies
        run: pip-audit -r lambdas/requirements.txt -d --no-deps

      - name: Audit demo dependencies
        run: pip-audit -r demo/requirements.txt -d --no-deps

  trivy-repo:
    name: Trivy filesystem scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
