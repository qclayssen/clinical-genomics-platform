name: infra-ci

on:
  push:
    paths: ['infra/**', '.github/workflows/infra-ci.yml']
  pull_request:

# Least privilege: these jobs only read the repo.
permissions:
  contents: read

jobs:
  synth-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run: { working-directory: infra }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: infra/package-lock.json }

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Jest guardrail tests (versioning, public-access, deny-delete)
        run: npm test

      - name: CDK synth (all stacks)
        run: npx cdk synth --all
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: ap-southeast-2

      - name: Validate no Batch/Fargate/NAT resources
        run: |
          if grep -rl "AWS::Batch\|AWS::ECS::Service\|AWS::EC2::NatGateway\|AWS::RDS\|AWS::Bedrock\|AWS::SageMaker::Endpoint" cdk.out/*.template.json; then
            echo "ERROR: Banned resource types found in synthesized templates"
            exit 1
          fi
          echo "No banned resources found — cost guardrails pass"
