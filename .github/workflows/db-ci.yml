name: db-ci

on:
  push:
    paths: ['db/**', '.github/workflows/db-ci.yml']
  pull_request:
    paths: ['db/**', '.github/workflows/db-ci.yml']

concurrency:
  group: db-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  migration-validation:
    name: Postgres schema + migration + immutability tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cgp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cgp_test

    steps:
      - uses: actions/checkout@v4

      - name: Apply schema.sql
        run: psql -f db/schema.sql

      - name: Apply migration 0001_init.sql (idempotency check)
        run: |
          # Create a fresh database and apply migration from scratch
          psql -c "DROP DATABASE IF EXISTS cgp_migration_test;"
          psql -c "CREATE DATABASE cgp_migration_test;"
          PGDATABASE=cgp_migration_test psql -f db/schema.sql
          echo "Migration applied successfully on fresh DB (idempotent)"

      - name: Load seed data
        run: psql -f db/seed_demo.sql

      - name: Test immutability triggers
        run: |
          echo "=== Testing immutability triggers ==="

          # Test UPDATE on runs table
          echo -n "UPDATE on runs... "
          if psql -c "UPDATE runs SET pipeline_version = 'hack' WHERE run_id = 'run_2026_0301_a';" 2>&1 | grep -q "insert-only"; then
            echo "BLOCKED (correct)"
          else
            echo "FAILED — UPDATE was not blocked!" && exit 1
          fi

          # Test DELETE on runs table
          echo -n "DELETE on runs... "
          if psql -c "DELETE FROM runs WHERE run_id = 'run_2026_0301_a';" 2>&1 | grep -q "insert-only"; then
            echo "BLOCKED (correct)"
          else
            echo "FAILED — DELETE was not blocked!" && exit 1
          fi

          # Test UPDATE on qc_metrics table
          echo -n "UPDATE on qc_metrics... "
          if psql -c "UPDATE qc_metrics SET snp_f1 = 0.0 WHERE id = 1;" 2>&1 | grep -q "insert-only"; then
            echo "BLOCKED (correct)"
          else
            echo "FAILED — UPDATE was not blocked!" && exit 1
          fi

          # Test DELETE on audit_log table
          echo -n "DELETE on audit_log... "
          # Ensure at least one row exists so the FOR EACH ROW trigger fires
          psql -c "INSERT INTO audit_log (run_pk, action, detail) SELECT id, 'CI_TEST', 'immutability check' FROM runs LIMIT 1;" 2>/dev/null
          if psql -c "DELETE FROM audit_log WHERE action = 'CI_TEST';" 2>&1 | grep -q "insert-only"; then
            echo "BLOCKED (correct)"
          else
            echo "FAILED — DELETE was not blocked!" && exit 1
          fi

          # Test UPDATE on qc_warnings table
          echo -n "UPDATE on qc_warnings... "
          if psql -c "UPDATE qc_warnings SET overall_status = 'fail' WHERE id = 1;" 2>&1 | grep -q "insert-only"; then
            echo "BLOCKED (correct)"
          else
            # qc_warnings may have no rows — insert one to test
            psql -c "INSERT INTO qc_warnings (run_pk, sample_id, overall_status, metric_name, metric_value, threshold_warn, threshold_fail, threshold_source) SELECT id, 'HG002_chr20', 'warn', 'dup', 0.09, 0.08, 0.12, 'adaptive' FROM runs LIMIT 1;"
            if psql -c "UPDATE qc_warnings SET overall_status = 'fail' WHERE id = 1;" 2>&1 | grep -q "insert-only"; then
              echo "BLOCKED (correct)"
            else
              echo "FAILED — UPDATE was not blocked!" && exit 1
            fi
          fi

          echo ""
          echo "=== All immutability triggers verified ==="

      - name: Validate views are queryable
        run: |
          echo "=== Querying views ==="
          psql -c "SELECT count(*) AS run_summary_rows FROM v_run_summary;"
          psql -c "SELECT count(*) AS qc_warnings_rows FROM v_qc_warnings;"
          psql -c "SELECT count(*) AS warning_freq_rows FROM v_qc_warning_frequency;"
          psql -c "SELECT count(*) AS metric_vs_thresh_rows FROM v_qc_metric_vs_threshold;"
          echo "=== All views queryable ==="
