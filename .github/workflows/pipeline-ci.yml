name: pipeline-ci

on:
  push:
    paths: ['pipeline/**', 'ai-report/**', 'db/**', 'lambdas/**', 'tests/**', '.github/workflows/pipeline-ci.yml']
  pull_request:

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: these jobs only read the repo (no writes to contents/packages/etc.)
permissions:
  contents: read

jobs:
  lint-and-stub:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Nextflow config + lint
        working-directory: pipeline
        run: |
          nextflow -version
          nextflow config -profile test,docker > /dev/null   # fails on config errors

      - name: Stub run (full DAG, no containers needed)
        working-directory: pipeline
        run: nextflow run main.nf -profile test -stub --max_cpus 2

      - name: Unit tests + property-based tests (with coverage)
        run: |
          python -m pip install --quiet pytest hypothesis pytest-timeout pytest-cov boto3 botocore pyyaml
          pytest tests/ -v --timeout=300 \
            --cov=pipeline/bin --cov=lambdas --cov=ai-report \
            --cov-report=xml:coverage.xml \
            --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Validate Lambda handler imports
        run: |
          python -c "from lambdas.ingestion_trigger import handler"
          python -c "from lambdas.qc_orchestrator import handler"
          python -c "from lambdas.variant_calling import handler"
          python -c "from lambdas.validation_checker import handler"
          python -c "from lambdas.export_handler import handler"
          python -c "from lambdas.metadata_ingestor import handler"
          python -c "from lambdas.report_generator import handler"
          python -c "from lambdas.healer import handler"
          echo "All Lambda handlers import successfully"

  ai-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Report renderer produces guardrail-compliant output
        run: |
          python ai-report/make_dataset.py --n 3 --out /tmp/pairs.jsonl
          python - <<'PY'
          import json, subprocess, sys, tempfile
          rec = json.loads(open('/tmp/pairs.jsonl').readline())
          m = json.loads(rec['input'])
          with tempfile.NamedTemporaryFile('w', suffix='.json', delete=False) as f:
              json.dump(m, f); path = f.name
          out = subprocess.check_output(
              [sys.executable, 'ai-report/infer.py', '--metrics', path, '--offline'],
              text=True)
          assert 'AI-DRAFTED — REQUIRES CLINICIAN REVIEW' in out, 'banner missing'
          assert 'Provenance:' in out, 'provenance line missing'
          print('guardrails OK')
          PY

  ml-finetune-smoke:
    # Proves the PyTorch LoRA fine-tuning loop runs end-to-end on CPU (tiny model).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install CPU ML stack
        run: pip install --quiet torch transformers datasets peft --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple
      - name: Run LoRA fine-tuning smoke test
        run: python ai-report/train_smoke.py

  agent-interpretation:
    # Proves the variant interpretation agent loop works end-to-end (deterministic, no LLM).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install test dependencies
        run: pip install --quiet pytest hypothesis
      - name: Agent smoke tests
        run: pytest tests/test_agent_smoke.py -v
      - name: Agent property-based tests
        run: pytest tests/test_agent_properties.py -v
      - name: CLI end-to-end (deterministic)
        run: |
          python ai-report/agent/interpret.py \
            --vcf tests/fixtures/tiny_truth.vcf.gz \
            --metrics tests/fixtures/HG002_chr20.metrics.json \
            --backend deterministic \
            --out /tmp/interp.json \
            --run-id ci_e2e
          python -c "
          import json
          data = json.load(open('/tmp/interp.json'))
          assert data['banner'] == 'AI-DRAFTED VARIANT INTERPRETATION — REQUIRES CLINICAL GENETICIST REVIEW'
          assert len(data['variants']) > 0
          assert 'provenance' in data
          print(f'Agent CI: {len(data[\"variants\"])} variants classified')
          print(f'Classifications: {data[\"classification_counts\"]}')
          "

