name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for release notes generation

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Release ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full history.

            ### Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/cgp-tools:${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker-release:
    name: Build and push versioned Docker image
    needs: create-release
    uses: ./.github/workflows/docker.yml
    with:
      push_image: true
      version_tag: ${{ needs.create-release.outputs.version }}
    permissions:
      contents: read
      packages: write
      security-events: write
