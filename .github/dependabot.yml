# Dependabot dependency update configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Strategy: group ALL updates per ecosystem into a single PR to avoid PR flooding.
# Major bumps are included in the group — review them carefully before merging.

version: 2

updates:
  # Python — ai-report (ML/inference stack)
  - package-ecosystem: pip
    directory: /ai-report
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 3
    groups:
      all-python-ai-report:
        patterns: ["*"]

  # Python — lambdas
  - package-ecosystem: pip
    directory: /lambdas
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 3
    groups:
      all-python-lambdas:
        patterns: ["*"]

  # Python — demo app
  - package-ecosystem: pip
    directory: /demo
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 3
    groups:
      all-python-demo:
        patterns: ["*"]

  # npm — CDK infrastructure
  - package-ecosystem: npm
    directory: /infra
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 3
    groups:
      all-npm-infra:
        patterns: ["*"]

  # GitHub Actions — workflow action versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns: ["*"]

  # Docker — base image updates
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, automated]
    open-pull-requests-limit: 2
    groups:
      all-docker:
        patterns: ["*"]
