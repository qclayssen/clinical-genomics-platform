name: multiqc
description: Aggregate QC outputs across steps and samples into a single report
keywords:
  - qc
  - report
  - aggregate
  - summary
tools:
  - multiqc:
      description: Aggregate results from bioinformatics analyses across many samples into a single report.
      homepage: https://multiqc.info/
      documentation: https://multiqc.info/docs/
      tool_dev_url: https://github.com/MultiQC/MultiQC
      doi: 10.1093/bioinformatics/btw354
      licence: ["GPL-3.0-or-later"]
input:
  - - qc_files:
        type: file
        description: >
          A collected list of QC files to aggregate (fastp JSON, FastQC zips,
          MarkDuplicates metrics, and hap.py summaries), staged into the work directory.
        pattern: "*"
output:
  - report:
      - "multiqc_report.html":
          type: file
          description: Standalone HTML MultiQC report aggregating all supplied QC outputs
          pattern: "multiqc_report.html"
  - data:
      - "multiqc_data":
          type: directory
          description: Directory of parsed data tables backing the report
          pattern: "multiqc_data"
authors:
  - "Quentin Clayssen"
